<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#030705">
  <meta name="description" content="A fast, offline Arena deck-name colourifier for two- and three-colour identities.">
  <title>TurdGobbler's Deck Name Colourifier &mdash; V4</title>
  <link rel="stylesheet" href="styles.css">
  <script src="logic.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="masthead">
      <div>
        <p class="eyebrow">TURDGOBBLER'S</p>
        <h1>DECK NAME<br>COLOURIFIER</h1>
      </div>
      <span class="version-mark" aria-label="Version 4 expert edition">V4<span>//</span>EXPERT</span>
    </header>

    <section class="console" aria-label="Deck Name Colourifier">
      <div class="field-head">
        <label for="deckName">DECK NAME</label>
        <span id="inputState">ASCII READY</span>
      </div>
      <input id="deckName" class="deck-input" type="text" value="YOUR DECK NAME" autocomplete="off" autocapitalize="characters" spellcheck="false" aria-describedby="inputState">

      <button id="copyButton" class="copy-button" type="button" aria-describedby="copyHint copyStatus">
        <span id="outputPreview" class="output-preview" aria-hidden="true"></span>
        <span id="copyHint" class="copy-hint"><span class="desktop-copy">CLICK</span><span class="mobile-copy">TAP</span> TO COPY</span>
        <span id="copyBurst" class="copy-burst" aria-hidden="true"></span>
      </button>
      <p id="copyStatus" class="sr-only" role="status" aria-live="polite"></p>

      <div class="telemetry" aria-label="Arena raw character use and gradient stages">
        <span id="rawCount" class="raw-count">0 / 64</span>
        <span class="telemetry-rule" aria-hidden="true"></span>
        <span id="gradientPips" class="gradient-pips" aria-label="Gradient stages"></span>
      </div>

      <section id="identityPanel" class="identity-panel" aria-label="Mana colour presets">
        <div id="manaWheel" class="mana-wheel" role="group" aria-label="Choose mana colours"></div>
        <div class="preset-context"><span id="presetContext">MATCHING PRESETS</span><small id="selectionSummary">U + R</small></div>
        <div id="presetRail" class="preset-rail" aria-label="Matching colour presets"></div>
      </section>

      <button id="advancedToggle" class="advanced-toggle" type="button" aria-expanded="false" aria-controls="identityPanel advancedPanel">
        <span id="advancedToggleLabel">ADVANCED</span><b aria-hidden="true">+</b>
      </button>

      <section id="advancedPanel" class="advanced-panel" aria-label="Advanced colour and style controls" hidden>
        <div class="advanced-title"><span>ADVANCED CONTROLS</span><small>CHANGES STAY ACTIVE</small></div>
        <div class="advanced-body">
          <section class="custom-colours" aria-labelledby="customHeading">
            <div class="advanced-head">
              <div>
                <p class="micro-label">MANUAL OVERRIDE</p>
                <h3 id="customHeading">CUSTOM COLOURS</h3>
              </div>
              <div class="custom-tools">
                <span id="customState">INACTIVE</span>
                <button id="addCustomColour" class="add-custom-colour" type="button" aria-label="Add another custom gradient colour"><b aria-hidden="true">+</b><small>STOP</small></button>
              </div>
            </div>
            <div id="customPickers" class="custom-pickers"></div>
          </section>

          <section class="formatting" aria-labelledby="formatHeading">
            <div class="advanced-head">
              <div>
                <p class="micro-label">GLOBAL</p>
                <h3 id="formatHeading">STYLE</h3>
              </div>
              <span>3 RAW EACH</span>
            </div>
            <div class="format-grid" role="group" aria-label="Global text styling">
              <button type="button" data-format="bold" aria-pressed="false"><b>B</b><span>BOLD</span></button>
              <button type="button" data-format="italic" aria-pressed="false"><i>I</i><span>ITALIC</span></button>
              <button type="button" data-format="underline" aria-pressed="false"><u>U</u><span>LINE</span></button>
              <button type="button" data-format="strike" aria-pressed="false"><s>S</s><span>STRIKE</span></button>
            </div>
          </section>
        </div>
      </section>
    </section>

    <footer><span>LOCAL // NOTHING UPLOADED</span><span>ARENA RAW MAX: 64</span></footer>
  </main>
</body>
</html>
