<!doctype html>
<html lang="en-CA">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#09050d">
  <meta name="description" content="A fast, private Arena deck-name colourifier with direct gradient editing and ordered MTG colour composition.">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <title>TurdGobbler's Deck Name Colourifier &mdash; Version 5</title>
  <link rel="stylesheet" href="styles.css">
  <script src="logic.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app-shell">
    <header class="masthead">
      <h1><span>TURDGOBBLER'S</span> DECK NAME COLOURIFIER</h1>
      <b>V5</b>
    </header>

    <section class="console" aria-label="Version 5 Deck Name Colourifier">
      <div class="field-head">
        <label for="deckName">DECK NAME</label>
        <span id="inputState">ASCII READY</span>
      </div>
      <input id="deckName" class="deck-input" type="text" value="YOUR DECK NAME" autocomplete="off" autocapitalize="characters" spellcheck="false" aria-describedby="inputState">

      <button id="copyButton" class="copy-button" type="button" aria-describedby="copyHint copyStatus">
        <span id="outputPreview" class="output-preview" aria-hidden="true"></span>
        <span id="copyHint" class="copy-hint"><span class="copy-hint-default"><span class="desktop-copy">CLICK</span><span class="mobile-copy">TAP</span> TO COPY</span><span id="copyHintMessage" class="copy-hint-message" aria-hidden="true"></span></span>
        <span class="paste-hint">PASTE INTO ARENA</span>
        <span id="copyBurst" class="copy-burst" aria-hidden="true"></span>
      </button>
      <p id="copyStatus" class="sr-only" role="status" aria-live="polite"></p>

      <div class="telemetry" aria-label="Arena raw character use and gradient stages">
        <span id="rawCount" class="raw-count">0 / 64</span>
        <span class="telemetry-rule" aria-hidden="true"></span>
        <span id="gradientPips" class="gradient-pips" aria-label="Gradient stages"></span>
      </div>

      <section class="workbench" aria-label="Gradient workbench">
        <div class="gradient-label" aria-hidden="true"><span>YOUR GRADIENT</span></div>
        <div id="gradientBar" class="gradient-bar" role="button" tabindex="0" aria-label="Gradient tube. Activate a position to add a colour stop.">
          <span id="barStopMarkers" class="bar-stop-markers"></span>
        </div>

        <div class="tool-row">
          <button id="undoButton" class="tool-button undo-button" type="button" title="Undo the last colour or style change" disabled><b aria-hidden="true">&#8630;</b><span>UNDO</span></button>
          <div class="order-tools" aria-label="Gradient order controls">
            <button id="rotateGradient" class="tool-button" type="button" title="Move the first colour to the end"><b aria-hidden="true">&#8635;</b><span>ROTATE</span></button>
            <button id="flipGradient" class="tool-button" type="button" title="Reverse the colour order"><b aria-hidden="true">&#8644;</b><span>FLIP</span></button>
          </div>
          <div id="quickPalettes" class="quick-palette-pad" role="group" aria-label="Palette library"></div>
          <div class="format-pad" role="group" aria-label="Global text styling">
            <button type="button" data-format="bold" aria-label="Bold" aria-pressed="false"><b>B</b></button>
            <button type="button" data-format="italic" aria-label="Italic" aria-pressed="false"><i>I</i></button>
            <button type="button" data-format="underline" aria-label="Underline" aria-pressed="false"><u>U</u></button>
            <button type="button" data-format="strike" aria-label="Strikethrough" aria-pressed="false"><s>S</s></button>
          </div>
        </div>

        <div id="paletteTray" class="palette-tray" hidden>
          <div class="palette-toolbar">
            <span><small>PALETTE LIBRARY</small><b>COLOURS ONLY</b></span>
            <div class="palette-toolbar-actions">
              <button id="favouriteCurrent" type="button" aria-pressed="false"><b aria-hidden="true">&#9734;</b> SAVE CURRENT</button>
            </div>
          </div>
          <div id="builtInPalettes" class="palette-strip" aria-label="Built-in palettes"></div>
          <div id="savedPalettes" class="saved-palettes"></div>
        </div>
        <div id="stopRail" class="stop-rail" aria-label="Editable gradient stops"></div>
      </section>

      <section class="colour-dock mtg-station" aria-label="MTG preset finder">
        <div class="mtg-station-head">
          <span><small>PRESET FINDER</small><b>MTG SHORTCUTS</b></span>
          <small>PIPS FILTER RESULTS</small>
        </div>
        <div id="manaComposer" class="mana-composer" role="group" aria-label="Choose up to three MTG colours in gradient order"></div>
        <div class="identity-readout">
          <span><small>IDENTITY</small><b id="identityName">CHOOSE COLOURS</b></span>
          <span><small>ORDER</small><b id="manaOrder">&mdash;</b></span>
          <button id="clearMana" type="button" disabled>CLEAR</button>
        </div>
        <div class="preset-context">
          <span id="presetContext">PRESETS OFFLINE</span>
          <small id="selectionSummary">SELECT PIPS</small>
        </div>
        <div id="presetRail" class="preset-rail" aria-label="Matching MTG colour presets"></div>
      </section>
    </section>

    <footer><span>LOCAL // NOTHING UPLOADED</span><span>CTRL + ENTER // COPY</span></footer>
  </main>
</body>
</html>
